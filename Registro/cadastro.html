<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro — Vitrine Local</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="left-panel">
            <h1>Registre seus negócios</h1>
            <p>Conte-nos sobre sua equipe e suas necessidades e nós o colocaremos em contato com um especialista de vendas.</p>
            <a href="../index.html" class="s volte">Voltar</a>
        </div>

        <div>
            <h2>Formulário de Registro</h2>
            <form id="formAtendimento" onsubmit="return false;">

                <label for="empresa">Nome da empresa</label>
                <input type="text" id="empresa">

                <label for="responsavel">Seu nome e cargo</label>
                <input type="text" id="responsavel">

                <label for="email">Seu e-mail profissional</label>
                <input type="email" id="email">

                <label class="field-label">Quantos funcionários sua empresa tem?</label>
                <div class="radio-group">
                    <input type="radio" name="funcionarios" value="Entre 11 e 50" id="f1">
                    <label for="f1">Entre 11 e 50</label>

                    <input type="radio" name="funcionarios" value="Entre 51 e 200" id="f2">
                    <label for="f2">Entre 51 e 200</label>

                    <input type="radio" name="funcionarios" value="Entre 201 e 1000" id="f3">
                    <label for="f3">Entre 201 e 1000</label>
                </div>

                <label for="desafio">Qual é o maior desafio que você está tentando resolver?</label>
                <textarea id="desafio"></textarea>

                <label class="field-label">Quando você planeja começar?</label>
                <div class="radio-group">
                    <input type="radio" name="prioridade" value="Imediatamente" id="p1">
                    <label for="p1">Imediatamente</label>

                    <input type="radio" name="prioridade" value="Nas próximas semanas" id="p2">
                    <label for="p2">Nas próximas semanas</label>

                    <input type="radio" name="prioridade" value="Em 1 a 3 meses" id="p3">
                    <label for="p3">Em 1 a 3 meses</label>
                </div>
                <button type="submit">Enviar</button>
            </form>
            
        </div>
    </div>

    <div id="mensagem" class="erro" style="display: none;"></div>
    <div id="resultado" class="resultado" style="display: none;"></div>

    <script>
        const form = document.getElementById("formAtendimento");
        
        form.addEventListener("submit", function (event) {
            event.preventDefault();

            const empresa = document.getElementById("empresa").value.trim();
            const responsavel = document.getElementById("responsavel").value.trim();
            const email = document.getElementById("email").value.trim();
            const funcionarios = document.querySelector('input[name="funcionarios"]:checked');
            const desafio = document.getElementById("desafio").value.trim();
            const prioridade = document.querySelector('input[name="prioridade"]:checked');
            
            const erro = document.getElementById("mensagem");
            const resultado = document.getElementById("resultado");

            erro.style.display = "none";
            resultado.style.display = "none";

            if (empresa === "" || responsavel === "" || email === "" || desafio === "") {
                erro.innerHTML = "Preencha todos os campos!";
                erro.style.display = "block";
                return;
            }

            if (!funcionarios) {
                erro.innerHTML = "Selecione o número de funcionários!";
                erro.style.display = "block";
                return;
            }

            if (!prioridade) {
                erro.innerHTML = "Selecione quando deseja começar!";
                erro.style.display = "block";
                return;
            }

            let status = "";
            if (prioridade.value === "Imediatamente") {
                status = "Atendimento urgente.";
            } else if (prioridade.value === "Nas próximas semanas") {
                status = "Entraremos em contato em breve.";
            } else {
                status = "Seu registro foi agendado.";
            }

            resultado.style.display = "block";
            resultado.innerHTML = `
                <h3>Resumo do Registro</h3>
                <p><strong>Empresa:</strong> ${empresa}</p>
                <p><strong>Responsável:</strong> ${responsavel}</p>
                <p><strong>Email:</strong> ${email}</p>
                <p><strong>Funcionários:</strong> ${funcionarios.value}</p>
                <p><strong>Desafio:</strong> ${desafio}</p>
                <p><strong>Início:</strong> ${prioridade.value}</p>
                <p><strong>Status:</strong> ${status}</p>
            `;
        });
    </script>
</body>
</html>
