<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine Local</title>
    <style>
        *,
        *::before,
        *::after {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
        }
        
        :root {
          --azul-titulo: #1a1aff;
          --azul-hero-ini: #7ee8fa;
          --azul-hero-fim: #1565c0;
          --azul-card: #1a3a8f;
          --branco: #ffffff;
          --preto: #0d0d0d;
          --fonte-titulo: 'Syne', sans-serif;
          --fonte-corpo: 'DM Sans', sans-serif;
        }
        
        body {
          font-family: var(--fonte-corpo);
          background-color: #f0f2f5;
          color: var(--preto);
          min-height: 100vh;
        }
        
        .pagina {
          max-width: 1280px;
          margin: 0 auto;
          background: var(--branco);
          padding: 48px 64px 64px;
          box-shadow: 0 4px 40px rgba(0, 0, 0, 0.12);
        }
        
        .cabecalho {
          display: flex;
          align-items: baseline;
          gap: 16px;
          margin-bottom: 28px;
          flex-wrap: wrap;
        }
        
        .titulo-principal {
          font-family: var(--fonte-titulo);
          font-size: clamp(52px, 8vw, 96px);
          font-weight: 800;
          color: var(--azul-titulo);
          line-height: 1;
          letter-spacing: -2px;
        }
        
        .subtitulo {
          font-size: clamp(20px, 2.5vw, 28px);
          font-weight: 400;
          white-space: nowrap; 
        }
        
        .banner {
          width: 100%;
          height: clamp(260px, 38vw, 380px);
          border-radius: 20px;
          background: linear-gradient(135deg, var(--azul-hero-ini) 0%, var(--azul-hero-fim) 100%);
          position: relative;
          overflow: hidden;
          display: flex;
          align-items: center;
          justify-content: center;
          margin-bottom: 32px;
        }
        
        .forma-decorativa {
          position: absolute;
          border-radius: 50%;
          filter: blur(2px);
          opacity: 0.85; 
        }
        
        .banner2 {
          display: flex;
          align-items: center;
          gap: 28px;
          flex-wrap: wrap;
        }
        
        .textoCartão {
          flex: 1;
          min-width: 260px;
          background: var(--azul-card);
          color: var(--branco);
          padding: 20px 28px;
          border-radius: 16px;
          font-weight: 700;
          font-size: clamp(14px, 1.5vw, 17px);
          line-height: 1.55;
        }
        
        .botões {
          display: flex;
          gap: 16px;
          flex-shrink: 0;
        }
        
        .s {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          padding: 16px 32px;
          border-radius: 50px;
          font-family: var(--fonte-corpo);
          font-weight: 700;
          font-size: 16px;
          cursor: pointer;
          border: none;
          transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
          white-space: nowrap; 
          text-decoration: none; 
        }
        
        .s:hover {
          transform: translateY(-2px);
          box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
          opacity: 0.9;
        }
        
        .saiba,
        .cadastre {
          background: var(--preto);
          color: var(--branco);
        } 
        
        @media (max-width: 640px) {
            .pagina {
                padding: 24px 20px 40px;
            }
    
            .botões {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="pagina">
        <header class="cabecalho">
            <h1 class="titulo-principal">Vitrine Local</h1>
            <span class="subtitulo">Negócios Virtuais</span>
        </header>
        
        <div class="banner" role="img" aria-label="Decoração visual em tons azul">
            <img src="formato.png" alt="formato" style="width: 100%; height: 125%; object-fit: cover; object-position: center; position: absolute; top: 0; left: 0;">
        </div>
    
        <div class="banner2">
           <div class="textoCartão">
            A divulgação de pequenos negócios locais é essencial para fortalecer a
            economia da comunidade e gerar mais oportunidades para os moradores.
           </div> 
           <div class="botões">
            <a href="Funcionamento/funciona.html" class="s saiba">Saiba mais</a>
            <a href="Registro/cadastro.html" class="s cadastre">Cadastre-se</a>
           </div>
        </div>
    </div>
</body>
</html>
